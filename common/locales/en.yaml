      singularity: "Singularity - use Singularity container"
      modal: "Modal Cloud - use Modal cloud service"
    using_local: "Using local execution environment"
    using_docker: "Using Docker container environment"
    docker_image: "Docker Image"
    configure_resources: "Configure container resources (CPU/memory/disk)?"
    using_ssh: "Using SSH remote execution"
    ssh_host: "SSH Host"
    ssh_user: "SSH User"
    ssh_port: "SSH Port"
    ssh_key: "SSH Key Path"
    using_singularity: "Using Singularity container environment"
    singularity_image: "Singularity Image"
    using_modal: "Using Modal Cloud environment"
    modal_image: "Modal Image"

  # Workspace Config
  workspace:
    title: "📁 Workspace Configuration"
    description: "Set the workspace directory for Agent-Z, containing config, sessions, memories, etc."
    current: "Current path"
    change_prompt: "Do you want to change the workspace path?"
    new_path: "Enter new workspace path"
    directory_not_empty: "⚠️  Target directory exists and is not empty"
