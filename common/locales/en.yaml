      mistral: "Mistral Voxtral TTS (multilingual, needs API key)"
      gemini: "Google Gemini TTS (30 prebuilt voices, needs API key)"
      neutts: "NeuTTS (local on-device, free, ~300MB model download)"
      kittentts: "KittenTTS (local on-device, free, lightweight)"
    keep_current: "Keep current ({provider})"
    installing: "Installing dependencies..."
    first_use_download: "Model will be downloaded on first use (~300MB)"
    voice: "Select TTS Voice:"
    select_voice: "Select TTS Voice:"
    voices:
      alloy: "Alloy - neutral"
      echo: "Echo - male voice"
      fable: "Fable - British"
      onyx: "Onyx - male voice"
      nova: "Nova - female voice"
      shimmer: "Shimmer - female voice"
    model: "TTS Model"
    provider_set: "TTS provider set to: {provider}"

  # Browser
  browser:
    title: "🌐 Browser Automation"
    enable: "Enable Browser tool?"
    residential_proxy: "Enable Residential Proxies?"
    stealth_mode: "Enable advanced stealth mode? (requires Scale Plan)"
