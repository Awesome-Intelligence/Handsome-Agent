    get_api_key: "Get your API key: {url}"
    existing_key: "Existing API Key found: {key}"
    reuse_key: "Keep existing API Key?"
    input_api_key: "API Key"
    custom_url: "Use custom API URL?"
    input_url: "API URL"
    default_url: "Default API URL: {url}"
    select_model: "Please select model:"
