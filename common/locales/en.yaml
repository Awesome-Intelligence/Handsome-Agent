    "yes": "Yes"
    "no": "No"
    quit_hint: "(input q to go back)"
    enter_to_default: "(press Enter to use default: {default})"
    cancel: "Cancelled"
    saved: "Configuration saved!"
    back: "Back"
    exit_msg: "Exited configuration"

  questions:
    required_field: "This field is required, please enter a value"
    invalid_input: "Please enter 'y' or 'n'"
    out_of_range: "Please enter a number between 1 and {max}"

  # LLM Provider Setup
  llm:
    title: "🤖 LLM Provider Configuration"
    current_status: "Current configuration:"
    provider: "Provider"
    model: "Model"
    api_key_masked: "API Key: {prefix}...{suffix}"
    select_provider: "Please select LLM provider:"
    keep_current: "Keep current ({provider})"
    not_configured: "Not configured (basic template mode)"
