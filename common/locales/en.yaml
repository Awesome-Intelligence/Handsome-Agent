  # Model Config
  model_config:
    title: "🔧 Model Parameters"
    max_tokens: "Max Tokens"
    temperature: "Temperature (0.0-2.0)"
    context_window: "Context Window"

  # Terminal Backend
  terminal:
    title: "💻 Terminal Backend"
    select_backend: "Please select Terminal backend:"
    backends:
