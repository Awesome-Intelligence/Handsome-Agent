  random_greeting: >
    "存在先于本质。 |
    我思故我在。 |
    人生没有意义，但认识人生本身便是一种意义。 |
    所有的改变都是一种遗忘。 |
    自由是一种沉重的负担。 |
    人的终点不在于填满，而在于照亮。 |
    唯一确定的事是不确定。 |
    深渊凝视你时，你也在凝视深渊。 |
    生命中最难的，不是没有人懂你，而是你不懂自己。"

