# =============================================================================
# Banner Messages
# =============================================================================

banner:
  setup_title: "◆ Handsome Agent 设置向导 ◆"
  setup_subtitle: "你的全能 AI 助手"
  config_status: "配置状态"
  run_commands: "运行命令："
  # Random greeting messages separated by | (pipe character)
  random_greeting: >
    "代码写得好，bug 少；注释写得妙，问题早知道。 |
    Talk is cheap, show me the code。 |
    一个优秀的程序员是在穿过地狱时还在写注释的人。 |
    Debug 比写代码难两倍，所以如果你写代码时很聪明，Debug 时就更难了。 |
    先把事情做对，再把事情做巧。 |
    好的代码是最好的文档。 |
    不要只会 Ctrl+C/Ctrl+V，要理解背后的逻辑。 |
    程序员的三大谎言：我明天就改、注释以后补、这是最后一版。 |
    代码之美在于简洁，智慧之美在于分享。 |
    学会阅读他人代码，是成长的捷径。"

