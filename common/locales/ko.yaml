    "존재가 본질에 先立つ다. |
    나는 생각한다, 고로 존재한다. |
    성찰되지 않은 삶은 살 가치가 없다. |
    삶을 위한 이유를 가진 사람은 거의 모든 방법을 견딜 수 있다. |
    인간은 자유로울 운명이다. |
    두려워할 것은 오직 두려움 자체뿐이다. |
    어려움 한가운데에 기회가 있다. |
    마음이全て이다. 무슨 생각을 하느냐가 곧 너 자신이 된다. |
    아무도 섬이 아니다."

