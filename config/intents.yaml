# 意图识别配置
intent_classification:
  # 模式选择:
  # - "keyword": 仅使用关键词匹配（快速但不智能）
  # - "llm": 优先使用大语言模型（智能），如果 LLM 不可用则 fallback 到关键词
  # - "hybrid": 关键词优先，如果置信度低则调用 LLM（**推荐生产环境使用**）
  # 
  # ⚠️ 重要：无论选择哪种模式，当 LLM 不可用时，都会自动 fallback 到关键词
  mode: "llm"
  
  # 混合模式下的置信度阈值
  # 当关键词匹配置信度 >= 此值时，直接使用关键词结果
  # 否则调用 LLM 进行意图识别
  confidence_threshold: 0.3
  
  # 是否启用详细日志
  enable_detailed_logs: true
  
  # 默认语言（支持: zh, en, ja, ko）
  default_language: "zh"
  
  # LLM 提示词模板
  llm_prompt_template: |
    分析以下用户输入，判断其意图类型。

    可用的意图类型：
    {intents_list}

    用户输入："{user_input}"

    请返回最匹配的意图类型名称（只需返回意图名称，不需要其他内容）。
    如果输入是命令（打开应用、运行程序等），优先分类为 "terminal"。
    如果不确定，优先分类为 "conversation"。
