# Handsome Agent Docker 配置

version: '3.8'

services:
  brain:
    build:
      context: .
      dockerfile: Dockerfile.brain
    container_name: handsome-brain
    ports:
      - "8001:8001"
    environment:
      - BRAIN_SERVICE_PORT=8001
      - MAX_ITERATIONS=10
      - TIMEOUT_SECONDS=60
      - LOG_LEVEL=INFO
    volumes:
      - ./skills:/root/.skills
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - handsome-network

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: handsome-gateway
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_PORT=8000
      - BRAIN_SERVICE_URL=http://brain:8001
    depends_on:
      - brain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - handsome-network

networks:
  handsome-network:
    driver: bridge