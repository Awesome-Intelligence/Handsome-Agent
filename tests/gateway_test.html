<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUI Gateway 测试客户端</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            color: #00d9ff;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .connection {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .connection input {
            background: #0f3460;
            border: 1px solid #00d9ff;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            width: 300px;
        }
        
        .connection button {
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }
        
        .connection button:hover {
            background: #00b8d9;
        }
        
        .connection button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        
        .output {
            background: #0f0f1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .output .delta {
            color: #00ff88;
        }
        
        .output .reasoning {
            color: #888;
            font-style: italic;
        }
        
        .output .tool-start {
            color: #ff9f43;
        }
        
        .output .tool-end {
            color: #54a0ff;
        }
        
        .output .complete {
            color: #00d9ff;
            border-top: 1px solid #333;
            margin-top: 10px;
            padding-top: 10px;
        }
        
        .output .error {
            color: #ff6b6b;
        }
        
        .output .info {
            color: #666;
            font-size: 12px;
        }
        
        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .clear-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TUI Gateway WebSocket 测试客户端</h1>
        
        <div class="connection">
            <input type="text" id="wsUrl" value="ws://127.0.0.1:18765" placeholder="WebSocket URL">
            <button id="connectBtn" onclick="connect()">连接</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>断开</button>
        </div>
        
        <div class="output" id="output">
            <div class="info">等待连接...</div>
        </div>
        
        <button class="clear-btn" onclick="clearOutput()">清空输出</button>
    </div>
    
    <script>
        let ws = null;
        
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }
        
        function clearOutput() {
            document.getElementById('output').innerHTML = '<div class="info">输出已清空</div>';
        }
        
        function connect() {
            const url = document.getElementById('wsUrl').value;
            
            if (ws) {
                ws.close();
            }
            
            log(`正在连接 ${url}...`, 'info');
            
            ws = new WebSocket(url);
            
            ws.onopen = function() {
                log('连接已建立', 'info');
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    log(`收到: ${event.data}`, 'info');
                }
            };
            
            ws.onerror = function(error) {
                log(`连接错误: ${error}`, 'error');
            };
            
            ws.onclose = function() {
                log('连接已关闭', 'info');
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                ws = null;
            };
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
        
        function handleMessage(data) {
            const type = data.type;
            const payload = data.data || {};
            
            switch (type) {
                case 'session.created':
                    log(`会话已创建: ${data.session_id}`, 'info');
                    break;
                    
                case 'stream.delta':
                    log(`[输出] ${payload.text}`, 'delta');
                    break;
                    
                case 'stream.reasoning':
                    log(`[推理] ${payload.text}`, 'reasoning');
                    break;
                    
                case 'stream.tool_start':
                    log(`[工具开始] ${payload.tool_name}`, 'tool-start');
                    break;
                    
                case 'stream.tool_end':
                    log(`[工具结束] ${payload.tool_name} - ${JSON.stringify(payload.tool_output)}`, 'tool-end');
                    break;
                    
                case 'stream.complete':
                    log(`[完成] ${payload.text}`, 'complete');
                    if (payload.reasoning) {
                        log(`[推理摘要] ${payload.reasoning}`, 'reasoning');
                    }
                    break;
                    
                case 'stream.error':
                    log(`[错误] ${payload.message}`, 'error');
                    break;
                    
                case 'error':
                    log(`[协议错误] ${data.error}`, 'error');
                    break;
                    
                default:
                    log(`[收到] ${type}: ${JSON.stringify(payload)}`, 'info');
            }
        }
        
        // 页面加载时自动连接（可选）
        // window.onload = connect;
    </script>
</body>
</html>
